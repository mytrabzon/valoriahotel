<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Valoria Hotel – Sözleşme ve misafir bilgileri</title>
  <style>
    :root{ --bg:#0b1220; --card:#fff; --muted:#6b7280; --text:#111827; --brand:#b8860b; --brand2:#1a365d; --line:#e5e7eb; }
    *{box-sizing:border-box;}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:#fff;}
    .wrap{max-width:720px;margin:0 auto;padding:20px 16px 40px;}
    .hero{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;}
    .brand{font-weight:800;}.brand small{display:block;color:rgba(255,255,255,.75);font-size:13px;margin-top:4px;}
    .pill{font-size:12px;color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.2);padding:6px 12px;border-radius:999px;}
    .card{background:var(--card);color:var(--text);border-radius:16px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.3);margin-bottom:16px;}
    .cardHead{padding:14px 18px;border-bottom:1px solid var(--line);}
    .cardHead h2{margin:0;font-size:15px;font-weight:800;color:var(--brand2);}
    .formBlock{padding:14px 18px;}
    .formBlock label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;}
    .formBlock input,.formBlock select,.formBlock textarea{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-bottom:12px;}
    .formBlock textarea{min-height:70px;resize:vertical;}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .phoneRow{display:grid;grid-template-columns:100px 1fr;gap:10px;}
    .chipRow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
    .chip{padding:10px 14px;border-radius:10px;border:1px solid var(--line);background:#f9fafb;cursor:pointer;font-size:14px;}
    .chip.selected{background:var(--brand2);color:#fff;border-color:var(--brand2);}
    .signerBox{background:rgba(184,134,11,.12);border:1px solid rgba(184,134,11,.4);border-radius:12px;padding:14px;margin:14px 18px;font-size:13px;line-height:1.5;}
    .signerBox .line{margin-bottom:4px;}
    .contractContent{padding:14px 18px;max-height:50vh;overflow:auto;font-size:14px;line-height:1.5;border-top:1px solid var(--line);}
    .footer{padding:14px 18px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;}
    .btn{appearance:none;border:0;cursor:pointer;padding:14px 20px;border-radius:12px;font-weight:800;background:linear-gradient(135deg,var(--brand),#f2c14d);color:#1b1300;}
    .btn:disabled{opacity:0.6;cursor:not-allowed;}
    .err{color:#dc2626;font-size:13px;margin-top:8px;}
    .load{text-align:center;padding:3rem;color:rgba(255,255,255,.8);}
    .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#b8860b;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="brand">Valoria Hotel<small>Sözleşme ve misafir bilgileri</small></div>
      <div class="pill">Vercel</div>
    </div>

    <div id="load" class="card"><div class="load"><div class="spinner"></div><p>Sözleşme yükleniyor...</p></div></div>

    <form id="f" style="display:none;">
      <div class="card">
        <div class="cardHead"><h2>1. Zorunlu bilgiler</h2></div>
        <div class="formBlock">
          <label>Ad Soyad *</label>
          <input type="text" name="full_name" required placeholder="Ahmet Yılmaz" />
          <label>Kimlik tipi</label>
          <div class="chipRow">
            <span class="chip selected" data-name="id_type" data-value="tc">TC Kimlik</span>
            <span class="chip" data-name="id_type" data-value="passport">Pasaport</span>
            <span class="chip" data-name="id_type" data-value="other">Sürücü Belgesi</span>
          </div>
          <input type="hidden" name="id_type" value="tc" />
          <label>Kimlik numarası</label>
          <input type="text" name="id_number" placeholder="TC veya pasaport no" />
          <label>Telefon (WhatsApp) *</label>
          <div class="phoneRow">
            <select name="phone_country_code" id="phone_country_code"></select>
            <input type="tel" name="phone_number" required placeholder="555 123 4567" />
          </div>
          <label>E-posta</label>
          <input type="email" name="email" placeholder="ahmet@email.com" />
          <label>Uyruk</label>
          <select name="nationality" id="nationality"></select>
          <label>Doğum tarihi (GG.AA.YYYY)</label>
          <input type="text" name="date_of_birth" placeholder="15.05.1985" />
          <label>Cinsiyet</label>
          <div class="chipRow">
            <span class="chip selected" data-name="gender" data-value="male">Erkek</span>
            <span class="chip" data-name="gender" data-value="female">Kadın</span>
          </div>
          <input type="hidden" name="gender" value="male" />
          <label>Adres</label>
          <textarea name="address" placeholder="Atatürk Cad. No:123, Şehir"></textarea>
          <div class="row2">
            <div><label>Giriş (GG.AA.YYYY)</label><input type="text" name="check_in_date" placeholder="20.03.2026" /></div>
            <div><label>Çıkış (GG.AA.YYYY)</label><input type="text" name="check_out_date" placeholder="25.03.2026" /></div>
          </div>
          <label>Oda tipi</label>
          <select name="room_type" id="room_type"></select>
          <div class="row2">
            <div><label>Yetişkin</label><input type="number" name="adults" min="0" value="1" /></div>
            <div><label>Çocuk (12 yaş altı)</label><input type="number" name="children" min="0" value="0" /></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="cardHead"><h2>2. Sözleşme metni</h2></div>
        <div class="contractContent" id="contractContent"></div>
        <div class="signerBox" id="signerBox">Formu doldurun; imzalayan bilgileri burada görünecek.</div>
        <div class="footer">
          <div id="formErr" class="err"></div>
          <button type="submit" class="btn" id="submitBtn">Sözleşmeyi kabul ediyorum</button>
        </div>
      </div>
    </form>
  </div>

  <script>
    (function(){
      var API = 'https://sbydlcujsiqmifybqzsi.supabase.co/functions/v1/public-contract';
      var params = new URLSearchParams(location.search);
      var token = params.get('token')||params.get('t')||'valoria-resepsiyon-qr';
      var lang = params.get('lang')||params.get('l')||'tr';

      var countries = [{dial:'+90',name:'Türkiye'},{dial:'+1',name:'ABD / Kanada'},{dial:'+44',name:'Birleşik Krallık'},{dial:'+49',name:'Almanya'},{dial:'+33',name:'Fransa'},{dial:'+39',name:'İtalya'},{dial:'+34',name:'İspanya'},{dial:'+31',name:'Hollanda'},{dial:'+32',name:'Belçika'},{dial:'+43',name:'Avusturya'},{dial:'+41',name:'İsviçre'},{dial:'+7',name:'Rusya'},{dial:'+380',name:'Ukrayna'},{dial:'+48',name:'Polonya'},{dial:'+30',name:'Yunanistan'},{dial:'+351',name:'Portekiz'},{dial:'+972',name:'İsrail'},{dial:'+971',name:'BAE'},{dial:'+966',name:'Suudi Arabistan'},{dial:'+20',name:'Mısır'},{dial:'+212',name:'Fas'},{dial:'+98',name:'İran'},{dial:'+994',name:'Azerbaycan'},{dial:'+62',name:'Endonezya'},{dial:'+81',name:'Japonya'},{dial:'+86',name:'Çin'},{dial:'+91',name:'Hindistan'},{dial:'+61',name:'Avustralya'},{dial:'+55',name:'Brezilya'},{dial:'+52',name:'Meksika'}];
      var rooms = ['Tek kişilik','Çift kişilik','Üç kişilik','Aile','Suite','Diğer'];

      function fillSelect(id, opts, valueKey, labelKey){
        var sel = document.getElementById(id);
        if(!sel) return;
        opts.forEach(function(o){
          var v = valueKey ? o[valueKey] : o;
          var l = labelKey ? o[labelKey] : o;
          var opt = document.createElement('option');
          opt.value = v;
          opt.textContent = l;
          sel.appendChild(opt);
        });
      }
      fillSelect('phone_country_code', countries, 'dial', 'name');
      fillSelect('nationality', countries, 'name', 'name');
      fillSelect('room_type', rooms);

      fetch(API+'?format=json&token='+encodeURIComponent(token)+'&lang='+encodeURIComponent(lang), { headers: { 'Accept':'application/json' } })
        .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
        .then(function(data){
          document.getElementById('load').style.display='none';
          document.getElementById('f').style.display='block';
          document.getElementById('contractContent').innerHTML = data.content || '';
        })
        .catch(function(e){
          document.getElementById('load').innerHTML = '<div class="load"><p style="color:#fc8181">Sözleşme yüklenemedi. Token ve linki kontrol edin.</p></div>';
        });

      function updateSigner(){
        var dial = document.querySelector('[name=phone_country_code]').value;
        var phone = document.querySelector('[name=phone_number]').value.trim();
        var full = document.querySelector('[name=full_name]').value.trim();
        var id = document.querySelector('[name=id_number]').value.trim();
        var email = document.querySelector('[name=email]').value.trim();
        var nat = document.querySelector('[name=nationality]').value;
        var dob = document.querySelector('[name=date_of_birth]').value.trim();
        var g = document.querySelector('[name=gender]').value;
        var addr = document.querySelector('[name=address]').value.trim();
        var ci = document.querySelector('[name=check_in_date]').value.trim();
        var co = document.querySelector('[name=check_out_date]').value.trim();
        var rt = document.querySelector('[name=room_type]').value;
        var ad = document.querySelector('[name=adults]').value||'1';
        var ch = document.querySelector('[name=children]').value||'0';
        var gLabel = g==='female'?'Kadın':'Erkek';
        var lines = [];
        if(full) lines.push('Ad Soyad: '+full);
        if(id) lines.push('Kimlik No: '+id);
        if(dial&&phone) lines.push('Telefon (WhatsApp): '+dial+' '+phone);
        if(email) lines.push('E-posta: '+email);
        if(nat) lines.push('Uyruk: '+nat);
        if(dob) lines.push('Doğum: '+dob);
        lines.push('Cinsiyet: '+gLabel);
        if(addr) lines.push('Adres: '+addr);
        if(ci) lines.push('Giriş: '+ci);
        if(co) lines.push('Çıkış: '+co);
        lines.push('Oda: '+rt+', Yetişkin: '+ad+', Çocuk: '+ch);
        document.getElementById('signerBox').innerHTML = lines.length ? lines.map(function(l){ return '<div class=line>'+l+'</div>'; }).join('') : 'Formu doldurun.';
      }

      document.querySelectorAll('.chip').forEach(function(el){
        el.addEventListener('click', function(){
          var name = this.getAttribute('data-name');
          var val = this.getAttribute('data-value');
          document.querySelectorAll('.chip[data-name="'+name+'"]').forEach(function(c){ c.classList.remove('selected'); });
          this.classList.add('selected');
          document.querySelector('[name='+name+']').value = val;
          updateSigner();
        });
      });
      ['full_name','id_number','phone_number','email','date_of_birth','address','check_in_date','check_out_date','adults','children'].forEach(function(n){
        var el = document.querySelector('[name='+n+']');
        if(el) el.addEventListener('input', updateSigner);
      });
      document.querySelector('[name=phone_country_code]').addEventListener('change', updateSigner);
      document.querySelector('[name=nationality]').addEventListener('change', updateSigner);
      document.querySelector('[name=room_type]').addEventListener('change', updateSigner);

      document.getElementById('f').addEventListener('submit', function(e){
        e.preventDefault();
        var fn = document.querySelector('[name=full_name]').value.trim();
        var ph = document.querySelector('[name=phone_number]').value.trim();
        var errEl = document.getElementById('formErr');
        errEl.textContent = '';
        if(!fn){ errEl.textContent = 'Ad Soyad zorunludur.'; return; }
        if(!ph){ errEl.textContent = 'WhatsApp / Telefon numarası zorunludur.'; return; }
        var btn = document.getElementById('submitBtn');
        btn.disabled = true;

        var form = document.getElementById('f');
        var fd = new URLSearchParams(new FormData(form));
        var postUrl = API + '?token=' + encodeURIComponent(token) + '&lang=' + encodeURIComponent(lang);
        fetch(postUrl, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: fd })
          .then(function(r){
            if(!r.ok) throw new Error(r.status+'');
            return r.text();
          })
          .then(function(){
            window.location.href = 'success.html';
          })
          .catch(function(err){
            btn.disabled = false;
            errEl.textContent = 'Gönderilemedi. Tekrar deneyin.';
          });
      });
    })();
  </script>
</body>
</html>
