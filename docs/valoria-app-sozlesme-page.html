<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Valoria – Sözleşme Onayı</title>
  <style>
    body { margin: 0; height: 100vh; background: #0b1220; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
  </style>
</head>
<body>
  <iframe id="frame" title="Sözleşme"></iframe>
  <script>
    (function() {
      var qs = new URLSearchParams(location.search);
      var token = qs.get('token') || qs.get('t') || '';
      var lang = qs.get('lang') || qs.get('l') || 'tr';
      // Kendi Supabase proje adresinizi yazın (örn. xyz.supabase.co)
      var supabase = 'https://PROJE_ID.supabase.co/functions/v1/public-contract';
      var src = supabase + '?t=' + encodeURIComponent(token) + '&l=' + encodeURIComponent(lang);
      document.getElementById('frame').src = src;
    })();
  </script>
</body>
</html>
